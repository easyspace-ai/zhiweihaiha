<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { font-size: 16px; margin-bottom: 12px; color: #00d4aa; }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.ok { background: #0f3460; color: #00d4aa; }
    .status.error { background: #53354a; color: #ff6b6b; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #16213e;
      color: #eee;
      font-size: 14px;
      margin-bottom: 8px;
    }
    input:focus { outline: none; border-color: #00d4aa; }
    button {
      width: 100%;
      padding: 10px;
      background: #00d4aa;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #00b894; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 12px;
      padding: 12px;
      background: #16213e;
      border-radius: 6px;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error { color: #ff6b6b; }
    .info { color: #aaa; font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Polymarket Bridge</h1>
  <div id="status" class="status ok">插件已就绪</div>
  <input type="text" id="input" placeholder="粘贴 Polymarket 链接或 slug..." />
  <button id="fetchBtn">获取数据</button>
  <div id="result" class="result" style="display: none;"></div>
  <p class="info">获取的数据格式与后端 /api/polymarket/save 接口兼容</p>

  <script src="popup.js"></script>
</body>
</html>
