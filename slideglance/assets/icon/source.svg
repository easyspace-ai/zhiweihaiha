<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Soft rounded-square background. -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#f3f4f6"/>

  <!-- App-window frame: rounded rectangle + title bar divider +
       three traffic-light dots on the left. Reads instantly as a
       desktop application window. -->
  <g stroke="#6b7280" stroke-width="40" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <rect x="124" y="184" width="776" height="656" rx="48" ry="48"/>
    <line x1="144" y1="288" x2="880" y2="288"/>
  </g>
  <g fill="#6b7280">
    <circle cx="208" cy="236" r="14"/>
    <circle cx="256" cy="236" r="14"/>
    <circle cx="304" cy="236" r="14"/>
  </g>

  <!-- Bar chart inside the content area — the PowerPoint cue.
       Four bars in PPT-orange so the icon stays unambiguous at
       small sizes. -->
  <g fill="#c43e1c">
    <rect x="232" y="568" width="96" height="160" rx="12" ry="12"/>
    <rect x="372" y="464" width="96" height="264" rx="12" ry="12"/>
    <rect x="512" y="380" width="96" height="348" rx="12" ry="12"/>
    <rect x="652" y="512" width="96" height="216" rx="12" ry="12"/>
  </g>
</svg>
