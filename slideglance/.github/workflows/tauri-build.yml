name: CI - tauri-build

# Desktop-viewer cross-platform build is a manual-only operation —
# never runs automatically. The desktop app is intentionally excluded
# from CI gating, scheduled regression checks, AND from the release
# pipeline: `v*` tag pushes do NOT trigger this workflow, and the
# GitHub Release created by release.yml ships only npm packages and
# the .vsix.
#
# Triggers:
#   - workflow_dispatch — on-demand readiness build, or manual attach
#                         to an existing Release via the release_tag input
#
# Per-PR validation lives in ci.yml (Rust workspace) and the JS
# workflows; the desktop crate participates in `cargo test --workspace`
# and `apps/desktop-viewer` participates in the JS workspace typecheck,
# which is sufficient for code-correctness signal. Cross-OS Tauri
# regressions only surface when this workflow is dispatched manually.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "If set, attach built installers to this existing GitHub Release tag (e.g. v0.1.0). Leave empty for a regular readiness build with no upload."
        required: false
        default: ""

permissions:
  # `contents: write` is required for the branches that attach
  # installers to a GitHub Release — either the automatic tag-driven
  # path (push of `v*`) or a manual `workflow_dispatch` with the
  # `release_tag` input. Schedule / dispatch-without-input runs never
  # reach the upload step so the elevated scope is dormant there.
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        # Build the host's native triple per OS. The macOS universal
        # binary path (`--target universal-apple-darwin`) requires
        # tauri-cli to split into two `cargo build` calls, which is
        # version-sensitive and currently fails on the runner; the
        # native triple is sufficient for a release-readiness check.
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # pnpm version is sourced from the root `packageManager` field
      # (currently pnpm@10.33.0) — `pnpm-workspace.yaml` uses the
      # `catalog:` protocol that needs ≥ 9.5, and the lockfile is
      # generated by 10.x locally so CI must match to avoid
      # ERR_PNPM_LOCKFILE_CONFIG_MISMATCH.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          # `slideglance-wasm` is part of the JS workspaces' `prebuild`
          # step, so this build needs the wasm32 target alongside
          # the host triple.
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        # The `packages/core` prebuild shells out to `wasm-pack` (via
        # `scripts/build-wasm.sh`). Pre-install it so the JS workspace
        # build doesn't fail with "wasm-pack not found in PATH".
        # `version: latest` pulls a wasm-pack that ships a recent
        # `cargo_toml` / `cargo_metadata` — older releases (≤ 0.12)
        # fail to parse `license.workspace = true` style workspace
        # inheritance with "invalid type: map, expected a string".
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # Shared wasm dist cache — same key across every workflow.
      # The `runner.os` segment in the key auto-partitions across the
      # 3-OS matrix (Linux / macOS / Windows) so each host caches its
      # own wasm output. wasm-pack output is architecture-independent
      # in principle, but the build pipeline (wasm-opt, wasm-bindgen)
      # runs against per-OS binaries and we don't want to risk mixing.
      - id: wasm-dist-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/core/dist
            packages/measure/dist
          key: wasm-dist-${{ runner.os }}-${{ hashFiles('crates/**/*.rs', 'crates/**/Cargo.toml', 'Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', 'scripts/build-wasm.sh') }}

      # `shell: bash` is mandatory on Windows runners — the default
      # there is pwsh and `find -exec touch` is unavailable.
      - if: steps.wasm-dist-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          find packages/core/dist packages/measure/dist -type f -exec touch {} + 2>/dev/null || true

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      # Build wasm artefacts up front so the per-package `prebuild`
      # hooks (viewer / chrome-extension / web-playground) collapse to
      # cache-hit no-ops. Without this, `pnpm -r build` would fan out
      # the same wasm-pack work across multiple packages and serialize
      # them on `build-wasm.sh`'s defense-in-depth lock.
      - if: steps.wasm-dist-cache.outputs.cache-hit != 'true'
        name: Build wasm artefacts
        shell: bash
        run: bash scripts/build-wasm.sh
      - name: Build JS workspaces
        run: pnpm -r --filter './packages/*' --filter './apps/*' build
      - name: tauri build
        run: pnpm --filter @slideglance/desktop-viewer tauri build
      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: slideglance-viewer-${{ matrix.os }}
          # apps/desktop-viewer/src-tauri is a member of the root
          # Cargo workspace, so `cargo build` (and tauri-cli) emit to
          # `<workspace-root>/target/`, not the per-crate target dir.
          # Both this artifact upload and the Release attach below
          # need to glob the workspace target.
          path: target/release/bundle/**
          if-no-files-found: ignore

      - name: Attach installers to GitHub Release
        # Fires only when the workflow is manually dispatched with
        # `release_tag` set — automatic tag-push attachment was removed
        # to keep the desktop app out of the standard release flow.
        # `softprops/action-gh-release@v2` is idempotent: appends files
        # to the existing Release without overwriting unrelated assets.
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          # File-level globs: ship only the user-facing installer
          # bundles, not the bare `release/` binaries or `.app` dirs.
          files: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.msi.sig
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig
            target/release/bundle/rpm/*.rpm
          fail_on_unmatched_files: false
