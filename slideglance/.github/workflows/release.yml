name: Release

# Tag-driven release pipeline. Push a `v<semver>` tag whose value matches
# the root `package.json` version and this workflow will:
#
#   1. verify         — install, build wasm + JS, run the Rust workspace
#                       tests, and confirm `package.json` version matches
#                       the tag (single source of truth check).
#   2. publish-npm    — `pnpm publish` the 4 npm packages
#                       (@slideglance/core, measure, builder, viewer)
#                       in topological order with npm provenance.
#   3. publish-vsix   — `vsce package` the VS Code extension and attach
#                       the .vsix to the GitHub Release. Marketplace
#                       publishing is intentionally out of scope (no
#                       VSCE_PAT secret); the .vsix is download-and-
#                       install only.
#   4. publish-chrome-zip — build the Chrome extension and attach the
#                       Web Store upload zip
#                       (`slideglance-chrome-{version}.zip`) to the
#                       GitHub Release. Chrome Web Store auto-publish
#                       is intentionally out of scope (no chrome-
#                       webstore-upload secrets); the zip is download-
#                       and-load-unpacked only.
#   5. github-release — create the GitHub Release with auto-generated
#                       notes. The .vsix and Chrome zip attach themselves
#                       independently (see publish-vsix / publish-chrome-zip
#                       above). Desktop installers are intentionally
#                       excluded from the automatic flow; see tauri-build.yml
#                       for the manual-dispatch path.
#
# crates.io publish is intentionally NOT part of this pipeline. The
# Rust crates exist as internal scaffolding for the wasm bindings
# (@slideglance/core, @slideglance/measure); end users consume the
# library through npm, not crates.io. If that distribution model
# changes, re-add a publish-crates job and gate github-release on it.
#
# `workflow_dispatch` provides a dry-run path that runs every step but
# substitutes `--dry-run` for the actual publish — invoke it manually
# before the first real release to validate the pipeline end-to-end.
#
# Required GitHub secrets:
#   - NPM_TOKEN  — npm Granular Access Token scoped to the
#                  `@slideglance` org with `read-and-write` on every
#                  published package. Provenance also requires the
#                  `id-token: write` permission below.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all build/test steps but skip the real publish (uses --dry-run)."
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

jobs:
  verify:
    name: Verify release artefacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-version.outputs.version }}
    env:
      RUST_MIN_STACK: "16777216"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      # wasm-pack is always installed (~2s) even on cache hit: viewer's
      # prebuild hook (run-build-wasm.mjs -> scripts/build-wasm.sh)
      # checks `command -v wasm-pack` before its own up-to-date guard
      # kicks in, so pnpm -r build would fail mid-run otherwise. The
      # 5min wasm-pack *build* work is what the cache gates, not the
      # binary download.
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # Content-addressed wasm dist cache. `scripts/build-wasm.sh` was
      # taking ~5min per run and was the single biggest contributor to
      # release wall time. We key on every input that can change the
      # output bytes: every Rust source under crates/, every per-crate
      # manifest, the root workspace manifest, the lockfile, the
      # toolchain pin, and the build script itself.
      - id: wasm-dist-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/core/dist
            packages/measure/dist
          key: wasm-dist-${{ runner.os }}-${{ hashFiles('crates/**/*.rs', 'crates/**/Cargo.toml', 'Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', 'scripts/build-wasm.sh') }}

      # Cache extraction preserves the original mtimes (cache write time
      # < this checkout's stamp time), so `scripts/build-wasm.sh`'s
      # `find -newer` check would still classify the restored dist as
      # "older than source" and rebuild. Bump dist mtimes past checkout
      # so the up-to-date guard passes. No-op on miss (next step rebuilds).
      - if: steps.wasm-dist-cache.outputs.cache-hit == 'true'
        run: |
          find packages/core/dist packages/measure/dist -type f -exec touch {} + 2>/dev/null || true

      - id: read-version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$REF_TYPE" == "tag" ]]; then
            TAG_VERSION="${REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag $REF_NAME does not match package.json version $VERSION"
              exit 1
            fi
          fi
          echo "Releasing version $VERSION"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run version:check
      - if: steps.wasm-dist-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-wasm.sh
      - run: pnpm -r --filter './packages/*' build
      - run: rustup run stable cargo test --workspace --exclude slideglance-viewer

  publish-npm:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Always install Rust + wasm-pack: not because we always rebuild
      # wasm, but because `packages/viewer`'s `prebuild` hook unconditionally
      # invokes `scripts/run-build-wasm.mjs` → `scripts/build-wasm.sh`,
      # which guards on `command -v wasm-pack` before its own up-to-date
      # check. Setup is ~20s total; the actual `wasm-pack build` work is
      # what dominates and is gated by the cache below.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # Consumer-only restore: `verify` writes the cache, publish-npm
      # only reads. Same key derivation so both jobs land on the same
      # entry. On miss we fall back to rebuilding via the explicit
      # `bash scripts/build-wasm.sh` step below.
      - id: wasm-dist-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/core/dist
            packages/measure/dist
          key: wasm-dist-${{ runner.os }}-${{ hashFiles('crates/**/*.rs', 'crates/**/Cargo.toml', 'Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', 'scripts/build-wasm.sh') }}

      # See verify job — bump dist mtimes past checkout time so the
      # script's mtime-based up-to-date check passes on cache hit.
      - if: steps.wasm-dist-cache.outputs.cache-hit == 'true'
        run: |
          find packages/core/dist packages/measure/dist -type f -exec touch {} + 2>/dev/null || true

      - run: pnpm install --frozen-lockfile
      - if: steps.wasm-dist-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-wasm.sh
      - run: pnpm -r --filter './packages/*' build

      - name: Publish npm packages in topological order
        env:
          # pnpm respects NODE_AUTH_TOKEN via setup-node's .npmrc.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Enable npm provenance for supply-chain auditability. Requires
          # the workflow-level `id-token: write` permission above.
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail

          # Topological order:
          #   core / measure  (wasm bindings; leaves)
          #     downstream:
          #   builder         (depends on measure)
          #   viewer          (depends on core; React surface)
          PACKAGES=(
            "@slideglance/core"
            "@slideglance/measure"
            "@slideglance/builder"
            "@slideglance/viewer"
          )

          DRY_FLAG=()
          if [[ "$IS_DRY_RUN" == "true" ]]; then
            DRY_FLAG=(--dry-run)
          fi

          for pkg in "${PACKAGES[@]}"; do
            echo "::group::pnpm publish $pkg ${DRY_FLAG[*]}"
            # `--no-git-checks` is required because the worktree may
            # contain freshly-built dist/ output that is gitignored.
            pnpm --filter "$pkg" publish --access public --no-git-checks "${DRY_FLAG[@]}"
            echo "::endgroup::"
          done

  publish-vsix:
    name: Package and attach VSIX
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      # See verify job for cache rationale. wasm-pack is required because
      # slide-builder's `vscode:prepublish` hook transitively triggers
      # `scripts/build-wasm.sh` via the @slideglance/core / @slideglance/measure
      # prebuild chain — same guard as ci-vscode-extension.yml.
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - id: wasm-dist-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/core/dist
            packages/measure/dist
          key: wasm-dist-${{ runner.os }}-${{ hashFiles('crates/**/*.rs', 'crates/**/Cargo.toml', 'Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', 'scripts/build-wasm.sh') }}

      - if: steps.wasm-dist-cache.outputs.cache-hit == 'true'
        run: |
          find packages/core/dist packages/measure/dist -type f -exec touch {} + 2>/dev/null || true

      - run: pnpm install --frozen-lockfile
      - if: steps.wasm-dist-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-wasm.sh

      # Build viewer + builder up front so slide-builder's
      # `vscode:prepublish` hook (build:deps + build) collapses to
      # cache-hit no-ops. viewer's d.ts output is also required for
      # slide-builder's typecheck during `vsce package`.
      - run: pnpm -r --filter './packages/*' build

      - name: Package VSIX
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          VSIX_PATH="${GITHUB_WORKSPACE}/slideglance-vscode-${VERSION}.vsix"
          # `--no-dependencies` matches the existing local `pnpm package`
          # script — vsce's npm-list-based dependency walk doesn't
          # understand pnpm workspace symlinks.
          # `--out` overrides the default `{name}-{version}.vsix` so end
          # users on the Release page see `slideglance-vscode-*` instead
          # of the internal `slide-builder-*` package name.
          pnpm --filter slide-builder exec vsce package --no-dependencies --out "${VSIX_PATH}"
          echo "VSIX_PATH=${VSIX_PATH}" >> "$GITHUB_ENV"

      # Upload as workflow artifact regardless of dry-run / tag-push
      # status — gives a downloadable fallback if the Release attach
      # step fails or is skipped (mirrors tauri-build.yml).
      - name: Upload VSIX (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: slideglance-vscode
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error

      - name: Attach VSIX to GitHub Release
        # Same gating as the github-release job: only on real tag pushes.
        # `softprops/action-gh-release@v2` is idempotent and race-safe
        # with publish-chrome-zip's attach and the github-release
        # creation step — it creates the Release if no other job has yet.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.VSIX_PATH }}
          fail_on_unmatched_files: true

  publish-chrome-zip:
    name: Package and attach Chrome zip
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      # See verify job for cache rationale. wasm-pack is required because
      # chrome-extension's `prebuild` hook shells out to
      # `scripts/run-build-wasm.mjs` → `scripts/build-wasm.sh`.
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - id: wasm-dist-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/core/dist
            packages/measure/dist
          key: wasm-dist-${{ runner.os }}-${{ hashFiles('crates/**/*.rs', 'crates/**/Cargo.toml', 'Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', 'scripts/build-wasm.sh') }}

      - if: steps.wasm-dist-cache.outputs.cache-hit == 'true'
        run: |
          find packages/core/dist packages/measure/dist -type f -exec touch {} + 2>/dev/null || true

      - run: pnpm install --frozen-lockfile
      - if: steps.wasm-dist-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-wasm.sh

      # Pre-build workspace packages chrome-extension imports so the
      # extension's vite build resolves dist outputs from each
      # @slideglance/* dep without re-running their compilers.
      - run: pnpm -r --filter './packages/*' build

      - name: Package Chrome zip
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          # `scripts/package.mjs` writes apps/chrome-extension/
          # slideglance-chrome-${version}.zip — matching the
          # vsce-package output `slideglance-vscode-${version}.vsix`
          # so the GitHub Release ships matching artefact names.
          pnpm -F @slideglance/chrome-extension package
          ZIP_PATH="${GITHUB_WORKSPACE}/apps/chrome-extension/slideglance-chrome-${VERSION}.zip"
          test -f "${ZIP_PATH}"
          echo "ZIP_PATH=${ZIP_PATH}" >> "$GITHUB_ENV"

      - name: Upload Chrome zip (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: slideglance-chrome
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error

      - name: Attach Chrome zip to GitHub Release
        # Same gating as publish-vsix — only on real tag pushes.
        # softprops/action-gh-release@v2 is idempotent and race-safe
        # with publish-vsix's attach and the github-release creation
        # step — it creates the Release if no other job has yet.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ZIP_PATH }}
          fail_on_unmatched_files: true

  github-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-vsix, publish-chrome-zip]
    # Only run on real tag pushes — dry-run workflow_dispatch invocations
    # exercise the publish pipeline without leaving a draft Release behind.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Auto-generated release notes diff against the previous tag,
          # which needs the full commit history.
          fetch-depth: 0
      - name: Create or update Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # The Release may already exist if publish-vsix's
          # softprops/action-gh-release step (which runs in parallel
          # under `needs: verify`) reached the API first. Treat that as
          # benign and only fill in auto-generated notes when we are
          # the creator.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving in place."
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
