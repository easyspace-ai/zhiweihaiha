name: CI - rust-workspace

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "testing/vrt/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "testing/vrt/**"
      - ".github/workflows/ci.yml"
  schedule:
    # Weekly full-matrix + cargo-deny advisory refresh against main.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `--exclude slideglance-viewer` keeps the Tauri shell out of
      # this lane — it pulls glib-sys / gobject-sys / gtk-rs which
      # need `libgtk-3-dev` etc. and is fully covered by the dedicated
      # `tauri-build.yml` matrix. No `--all-features` for the same
      # reason: optional `system-fonts` / `metric-match` features
      # bring in `font-kit` (needs `libfontconfig-dev`).
      - run: cargo clippy --workspace --exclude slideglance-viewer --all-targets

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PRs only run ubuntu to keep the merge gate fast. The full
        # cross-platform matrix runs on `push: main`, the weekly
        # `schedule`, and any manual `workflow_dispatch` invocation —
        # cross-OS regressions are caught post-merge / nightly rather
        # than on every PR.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') }}
    env:
      # Some integration tests (renderer, parser) recurse over deep
      # PPTX trees and overflow the 8 MB default thread stack on
      # Windows / Linux runners. 16 MB matches the workspace
      # `pnpm test:rust` script.
      RUST_MIN_STACK: "16777216"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Same Tauri-on-Linux reasoning as clippy above. `rustup run`
      # invokes the toolchain's cargo via its rustup proxy directly,
      # which sidesteps the recurring macos-latest PATH conflict where
      # the runner's pre-installed Homebrew `rustup-init` shadows the
      # `cargo` binary `dtolnay/rust-toolchain` installed and makes
      # `cargo test ...` parse as `rustup-init test ...`.
      - run: rustup run stable cargo test --workspace --exclude slideglance-viewer

  wasm-build:
    name: wasm-pack build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/slideglance-wasm --target bundler
      - name: Report bundle size
        run: |
          ls -lh crates/slideglance-wasm/pkg/*.wasm
          du -h crates/slideglance-wasm/pkg/

  # cargo-deny: license / advisory / source / multiple-version gating per
  # deny.toml at the repo root. Advisory-db updates spuriously fail the
  # job on transient advisories, so we only run it on `push: main`, the
  # weekly `schedule`, and `workflow_dispatch` — never on PRs. This keeps
  # the merge gate immune to drive-by advisory churn we didn't introduce.
  deny:
    name: cargo deny
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # `deny.toml` already sets `all-features = true` under
          # `[graph]` so the dependency walk covers every feature
          # without needing the action-level `--all-features` flag,
          # which the action passes to *every* sub-command and
          # confuses cargo-deny in some configurations.
          arguments: ""

  vrt-rust:
    name: VRT (Rust snapshot regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The VRT case list is currently empty (testing/fixtures/ has
      # no decks). The cargo-test invocation still confirms the
      # harness compiles end-to-end against the live workspace, which
      # is the regression value the job actually delivers right now.
      # Add `VrtCase` entries to `testing/vrt/snapshot/src/lib.rs`
      # plus baseline images under `snapshots/` to expand coverage.
      - name: Run snapshot suite (verify only)
        run: cargo test --manifest-path testing/vrt/snapshot/Cargo.toml
