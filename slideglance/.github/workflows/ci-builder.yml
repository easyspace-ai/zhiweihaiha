name: CI - builder

on:
  push:
    branches: [main]
    paths:
      - "packages/builder/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".node-version"
      - ".github/workflows/ci-builder.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/builder/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".node-version"
      - ".github/workflows/ci-builder.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install wasm-pack
        # @slideglance/builder imports @slideglance/measure/node (used by
        # the yoga-layout text measurer); the dist is built from
        # crates/slideglance-measure-wasm via scripts/build-wasm.sh and
        # is gitignored, so CI has to produce it before tsc / vitest see
        # the package.
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # Shared wasm dist cache. Key is identical across every workflow
      # that runs scripts/build-wasm.sh, so a populated cache (most
      # commonly from release.yml or main-branch CI) is reusable here.
      - id: wasm-dist-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/core/dist
            packages/measure/dist
          key: wasm-dist-${{ runner.os }}-${{ hashFiles('crates/**/*.rs', 'crates/**/Cargo.toml', 'Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', 'scripts/build-wasm.sh') }}

      # GHA tar preserves the cache's original mtime, which is older
      # than this checkout's stamp time; touch dist past checkout so
      # scripts/build-wasm.sh's mtime up-to-date guard passes.
      - if: steps.wasm-dist-cache.outputs.cache-hit == 'true'
        run: |
          find packages/core/dist packages/measure/dist -type f -exec touch {} + 2>/dev/null || true

      - run: pnpm install --frozen-lockfile
      - if: steps.wasm-dist-cache.outputs.cache-hit != 'true'
        name: Build wasm artefacts
        run: bash scripts/build-wasm.sh
      - run: pnpm --filter @slideglance/builder run codegen:check
      - run: pnpm --filter @slideglance/builder run fmt:check
      - run: pnpm --filter @slideglance/builder run lint
      - run: pnpm --filter @slideglance/builder run knip
      - run: pnpm --filter @slideglance/builder run typecheck
      - run: pnpm --filter @slideglance/builder run test:coverage

      - name: Cache main branch coverage
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: packages/builder/coverage/coverage-summary.json
          key: builder-coverage-main-${{ github.sha }}

      - name: Backup PR coverage
        if: github.event_name == 'pull_request'
        run: cp packages/builder/coverage/coverage-summary.json /tmp/pr-coverage-summary.json

      - name: Restore main branch coverage
        id: restore-main-coverage
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: packages/builder/coverage/coverage-summary.json
          key: builder-coverage-main-
          restore-keys: builder-coverage-main-

      - name: Prepare coverage for comparison
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        run: |
          mkdir -p __main_coverage
          mv packages/builder/coverage/coverage-summary.json __main_coverage/
          cp /tmp/pr-coverage-summary.json packages/builder/coverage/coverage-summary.json

      - name: Coverage summary comment (with comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: builder
          json-summary-path: packages/builder/coverage/coverage-summary.json
          json-summary-compare-path: __main_coverage/coverage-summary.json

      - name: Coverage summary comment (without comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: builder
          json-summary-path: packages/builder/coverage/coverage-summary.json

      - run: pnpm exec tsx vrt/preview/sample.ts
        working-directory: packages/builder
